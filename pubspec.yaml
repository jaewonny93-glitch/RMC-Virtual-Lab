name: rmc_virtual_lab
description: RMC Virtual Lab - 분당서울대학교병원 재생의학센터 가상 세포 배양 시뮬레이터
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
  firebase_messaging: 15.1.3
  
  # State management
  provider: 6.1.5+1
  
  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # UI & Charts
  fl_chart: 0.69.0
  
  # Utilities
  intl: 0.19.0
  uuid: 4.5.1
  
  # Auto-update from GitHub
  package_info_plus: 8.3.0
  http: 1.5.0
  url_launcher: 6.3.1
  qr_flutter: 4.1.0
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
